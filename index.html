<div id="full-check-modal" class="overlay" style="display:none; z-index:100001;">
    <div class="modal-card" style="background: #fff; color: #000; padding: 40px 20px; font-family: 'Courier New', Courier, monospace; max-width: 350px;">
        <div class="modal-close" onclick="document.getElementById('full-check-modal').style.display='none'" style="color:#000;">×</div>
        <div style="text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="margin: 0; font-size: 22px; letter-spacing: 2px;">SENSEI</h2>
            <p style="margin: 5px 0; font-size: 12px;">BILLIARD CLUB</p>
            <p id="bill-date" style="font-size: 11px;"></p>
        </div>
        
        <div style="font-size: 13px; line-height: 1.6;">
            <div><b>ГОСТЬ:</b> <span id="bill-guest"></span></div>
            <div id="bill-table-info"><b>СТОЛ:</b> <span id="bill-table-num"></span></div>
            <div style="display: flex; justify-content: space-between;">
                <span>Начало: <span id="bill-start"></span></span>
                <span>Конец: <span id="bill-end"></span></span>
            </div>
            <div><b>ВРЕМЯ ИГРЫ:</b> <span id="bill-duration"></span></div>
        </div>

        <table style="width: 100%; margin-top: 15px; border-top: 1px solid #000; border-bottom: 1px solid #000; font-size: 12px; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left;">
                    <th style="padding: 5px 0;">ТОВАР</th>
                    <th>КОЛ</th>
                    <th>ЦЕНА</th>
                    <th style="text-align: right;">СУММА</th>
                </tr>
            </thead>
            <tbody id="bill-items-body"></tbody>
        </table>

        <div style="margin-top: 15px; text-align: right; font-size: 14px; font-weight: bold;">
            <div id="bill-time-row">ВРЕМЯ: <span id="bill-time-sum"></span> ₸</div>
            <div id="bill-bar-row">БАР: <span id="bill-bar-sum"></span> ₸</div>
            <div id="bill-discount-row" style="color: red; display:none;">СКИДКА: -<span id="bill-discount-val"></span>%</div>
            <div style="font-size: 20px; margin-top: 10px; border-top: 2px solid #000; padding-top: 5px;">ИТОГО: <span id="bill-total"></span> ₸</div>
        </div>

        <div style="text-align: center; margin-top: 30px; font-size: 10px; border-top: 1px dashed #000; padding-top: 10px;">
            СПАСИБО, ЧТО ВЫ С НАМИ!<br>ЖДЕМ ВАС СНОВА
        </div>
        
        <button onclick="window.print()" class="btn-gold" style="width: 100%; margin-top: 20px; background: #000; color: #fff; font-family: 'Montserrat';">ПЕЧАТЬ</button>
    </div>
</div>
