<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-box">
            <h1 class="gold-text">SENSEI</h1>
            <p class="subtitle">BILLIARD CLUB</p>
            <div class="input-group">
                <label>Выберите администратора</label>
                <select id="staff-select"></select>
            </div>
            <div class="input-group">
                <label>Введите пароль</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>
            <button onclick="login()" class="btn-primary">ВОЙТИ</button>
            <p id="auth-error" class="error-text">Неверный пароль!</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header class="header">
            <div class="header-left">
                <span class="status-dot"></span>
                <span id="display-user"></span>
            </div>
            <div class="header-right">
                <button onclick="logout()" class="btn-logout">ЗАКРЫТЬ СМЕНУ</button>
            </div>
        </header>

        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">ВЫРУЧКА</span>
                <span class="stat-value gold-text"><span id="rev-val">0</span> ₸</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ВАША ЗП</span>
                <span class="stat-value green-text"><span id="salary-val">0</span> ₸</span>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('hall')">ЗАЛ</button>
            <button class="tab-btn" onclick="switchTab('stock')">СКЛАД</button>
            <button class="tab-btn" onclick="switchTab('history')">ИСТОРИЯ</button>
        </nav>

        <main class="container">
            <div id="tab-hall" class="tab-content active">
                <div class="tables-grid" id="tables-list"></div>
            </div>

            <div id="tab-stock" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h3>Товары на складе</h3>
                        <button onclick="addStockItem()" class="btn-small">+ Добавить</button>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>Товар</th><th>Цена</th></tr></thead>
                        <tbody id="stock-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-history" class="tab-content">
                <div class="card">
                    <h3>История смен</h3>
                    <table class="data-table">
                        <thead><tr><th>Дата</th><th>Админ</th><th>Выручка</th></tr></thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
