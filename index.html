<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-box">
            <img src="logo.png.jpeg" alt="SENSEI" class="auth-logo-img">
            <h2 class="gold-text">ВХОД В СИСТЕМУ</h2>
            <div class="input-group">
                <label>Выберите сотрудника:</label>
                <select id="staff-select"></select>
            </div>
            <div class="input-group">
                <label>Введите пароль:</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>
            <button onclick="login()" class="btn-login">ПОДТВЕРДИТЬ</button>
            <p id="auth-error" class="error-msg">Неверный пароль!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header class="main-header">
            <div class="header-left">
                <img src="logo.png.jpeg" alt="SENSEI" class="small-logo">
                <h1 class="gold-text">SENSEI</h1>
            </div>
            <div class="header-right">
                <div class="admin-info">
                    <span id="role-badge" class="badge"></span>
                    <span id="display-admin-name"></span>
                </div>
            </div>
        </header>

        <nav class="navigation">
            <button class="nav-btn active" onclick="switchPage('hall')">ЗАЛ</button>
            <button class="nav-btn" onclick="switchPage('inventory')">СКЛАД</button>
            <button class="nav-btn" onclick="switchPage('debts')">ДОЛГИ</button>
            <button class="nav-btn" onclick="switchPage('my-stats')">МОЯ СМЕНА</button>
            <button id="owner-nav-btn" class="nav-btn" onclick="switchPage('accounting')" style="display:none;">БУХГАЛТЕРИЯ</button>
        </nav>

        <div class="shift-info">
            <div class="info-item">Выручка: <span id="stat-revenue" class="gold-text">0</span> ₸</div>
            <div class="info-item">ЗП за смену: <span id="stat-salary" class="green-text">0</span> ₸</div>
            <button class="btn-exit" onclick="logout()">ЗАКРЫТЬ СМЕНУ</button>
        </div>

        <main class="content-area">
            <div id="page-hall" class="page">
                <div class="tables-grid"></div>
            </div>

            <div id="page-inventory" class="page" style="display:none;">
                <div class="section-card">
                    <h3 class="gold-text">📦 Управление складом</h3>
                    <button onclick="addInventoryItem()" class="btn-gold-outline">+ Добавить товар</button>
                    <table class="data-table">
                        <thead><tr><th>Товар</th><th>Цена</th></tr></thead>
                        <tbody id="inventory-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="page-my-stats" class="page" style="display:none;">
                <div class="section-card">
                    <h3 class="gold-text">👤 Мои накопления</h3>
                    <div class="acc-box">К выплате: <span id="accumulated-salary" class="green-text">0</span> ₸</div>
                    <table class="data-table">
                        <thead><tr><th>Дата</th><th>Выручка</th><th>Ваша ЗП</th></tr></thead>
                        <tbody id="admin-personal-history"></tbody>
                    </table>
                </div>
            </div>

            <div id="page-accounting" class="page" style="display:none;">
                <div class="section-card">
                    <h3 class="gold-text">📈 История смен (Хозяин)</h3>
                    <div id="shift-history-list"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
