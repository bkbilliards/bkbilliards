<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI BILLIARD CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>SENSEI BILLIARD</h1>
        <div class="admin-panel">
            <span id="display-admin-name">Смена закрыта</span>
            <button id="shift-btn" onclick="toggleShift()">ОТКРЫТЬ СМЕНУ</button>
        </div>
        <div id="shift-stats">
            Выручка: <span id="stat-revenue">0</span> ₸ | ЗП (8%+6к): <span id="stat-salary">0</span> ₸
        </div>
    </div>

    <div class="hall-map"></div>

    <div class="inventory-section">
        <h2 style="color: #d4af37;">📦 СКЛАД / ТОВАРЫ</h2>
        <div id="inventory-list"></div>
        <button onclick="addInventoryItem()" style="background: #444; width: auto; padding: 10px;">+ Добавить товар на склад</button>
    </div>

    <div class="debt-section">
        <h2 style="color: #d4af37;">⚠️ ДОЛГИ</h2>
        <div id="debt-list"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
