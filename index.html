<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-box">
            <img src="logo.png.jpeg" alt="SENSEI" class="auth-logo-img">
            <h1 class="auth-title">SENSEI BILLIARD</h1>
            <div class="input-group">
                <label>Выберите администратора:</label>
                <select id="staff-select"></select>
            </div>
            <div class="input-group">
                <label>Введите пароль:</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>
            <button onclick="login()" class="btn-login">ВОЙТИ В СИСТЕМУ</button>
            <p id="auth-error" class="error-msg">❌ Неверный пароль!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">
            <div class="header-top">
                <div class="header-brand">
                    <img src="logo.png.jpeg" alt="SENSEI" class="small-logo">
                    <h1>SENSEI</h1>
                </div>
                <div class="admin-profile">
                    <span id="role-badge" class="badge"></span>
                    <span id="display-admin-name"></span>
                </div>
            </div>
            
            <nav class="navigation-menu">
                <button class="nav-btn active" onclick="switchPage('hall')">ЗАЛ</button>
                <button class="nav-btn" onclick="switchPage('inventory')">СКЛАД</button>
                <button class="nav-btn" onclick="switchPage('debts')">ДОЛГИ</button>
                <button class="nav-btn" onclick="switchPage('my-stats')">МОЯ СМЕНА</button>
                <button id="owner-nav-btn" class="nav-btn" onclick="switchPage('accounting')" style="display:none;">БУХГАЛТЕРИЯ</button>
            </nav>

            <div class="shift-summary">
                <div class="stat-box">Выручка: <span id="stat-revenue" class="gold-text">0</span> ₸</div>
                <div class="stat-box">Ваша ЗП: <span id="stat-salary" class="green-text">0</span> ₸</div>
                <button class="btn-logout" onclick="logout()">ЗАКРЫТЬ СМЕНУ</button>
            </div>
        </div>

        <main class="content">
            <div id="page-hall" class="page">
                <div class="tables-grid"></div>
            </div>

            <div id="page-inventory" class="page" style="display:none;">
                <div class="section-card">
                    <h2 class="gold-text">📦 Управление складом</h2>
                    <button onclick="addInventoryItem()" class="btn-action">+ ДОБАВИТЬ ТОВАР</button>
                    <table class="data-table">
                        <thead><tr><th>Название</th><th>Цена</th></tr></thead>
                        <tbody id="inventory-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="page-my-stats" class="page" style="display:none;">
                <div class="section-card">
                    <h2 class="gold-text">👤 Личная статистика</h2>
                    <div class="accumulated-box">Всего накоплено: <span id="accumulated-salary">0</span> ₸</div>
                    <table class="data-table">
                        <thead><tr><th>Дата</th><th>Выручка</th><th>ЗП</th></tr></thead>
                        <tbody id="admin-personal-history"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
