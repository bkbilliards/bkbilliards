<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h1 class="gold-text">SENSEI BILLIARD</h1>
            <p style="font-size: 12px; color: #666;">Вход в систему</p>
            
            <div class="field">
                <label>АДМИНИСТРАТОР</label>
                <select id="staff-select"></select>
            </div>
            
            <div class="field">
                <label>ПАРОЛЬ</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>
            
            <button onclick="login()" class="btn-primary">ВОЙТИ</button>
            <p id="auth-error" class="error-msg">❌ Ошибка: неверный пароль</p>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header class="top-bar">
            <div class="user-tag">
                <span id="role-label" class="badge"></span>
                <span id="user-name"></span>
            </div>
            <div class="stats-row">
                <span>Выручка: <b id="total-rev">0</b> ₸</span>
                <span>ЗП: <b id="my-salary">0</b> ₸</span>
            </div>
            <button class="btn-danger" onclick="logout()">ЗАКРЫТЬ СМЕНУ</button>
        </header>

        <nav class="tabs">
            <button class="tab-link active" onclick="openTab('hall')">ЗАЛ</button>
            <button class="tab-link" onclick="openTab('stock')">СКЛАД</button>
            <button class="tab-link" onclick="openTab('debts')">ДОЛГИ</button>
        </nav>

        <main class="main-view">
            <div id="tab-hall" class="tab-content">
                <div class="grid-tables" id="tables-container"></div>
            </div>

            <div id="tab-stock" class="tab-content" style="display:none;">
                <div class="card">
                    <h2 class="gold-text">СКЛАД</h2>
                    <button onclick="addItem()" class="btn-outline">+ ДОБАВИТЬ ТОВАР</button>
                    <table class="list-table">
                        <thead><tr><th>Название</th><th>Цена</th></tr></thead>
                        <tbody id="stock-list"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
