<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI BILLIARD CLUB CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-box">
            <img src="logo.png" alt="SENSEI" class="auth-logo-img">
            <h1 class="auth-logo">SENSEI</h1>
            <p class="auth-subtitle">BILLIARD CLUB</p>
            <div class="input-group">
                <label>Выберите сотрудника:</label>
                <select id="staff-select"></select>
            </div>
            <div class="input-group">
                <label>Пароль:</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>
            <button onclick="login()" class="btn-login">ВОЙТИ</button>
            <p id="auth-error" class="error-msg">❌ Неверный пароль!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">
            <div class="header-top">
                <div class="header-logo-block">
                    <img src="logo.png.jpeg" alt="SENSEI" class="header-logo-img">
                    <h1>SENSEI</h1>
                </div>
                <div class="user-info">
                    <span id="role-badge" class="badge"></span>
                    <span id="display-admin-name"></span>
                </div>
            </div>

            <div class="navigation-menu">
                <button class="nav-btn active" onclick="switchPage('hall')">ЗАЛ</button>
                <button class="nav-btn" onclick="switchPage('inventory')">СКЛАД</button>
                <button class="nav-btn" onclick="switchPage('debts')">ДОЛГИ</button>
                <button class="nav-btn" onclick="switchPage('my-stats')">МОЯ СМЕНА</button>
                <button id="owner-nav-btn" class="nav-btn" onclick="switchPage('accounting')" style="display:none;">БУХГАЛТЕРИЯ</button>
            </div>

            <div id="shift-stats">
                <div class="stat-card">Выручка: <span id="stat-revenue">0</span> ₸</div>
                <div class="stat-card">ЗП за смену: <span id="stat-salary">0</span> ₸</div>
            </div>
            <button class="btn-logout" onclick="logout()">ЗАКРЫТЬ СМЕНУ И ВЫЙТИ</button>
        </div>

        <div id="page-hall" class="page">
            <div class="hall-map"></div>
            <div class="open-checks-section">
                <h2 class="gold-title">📊 ТЕКУЩИЕ ЧЕКИ (Неоплаченные)</h2>
                <div id="open-checks-list"></div>
            </div>
        </div>

        <div id="page-inventory" class="page" style="display:none;">
            <div class="inventory-section">
                <h2 class="gold-title">📦 СКЛАД И ТОВАРЫ</h2>
                <input type="text" id="inventory-search" placeholder="Поиск (Кола, Cocacola...)" oninput="renderInventory()">
                <div id="inventory-list"></div>
                <button id="btn-add-inventory" onclick="addInventoryItem()" class="btn-start" style="margin-top:15px; display:none;">+ ДОБАВИТЬ ТОВАР</button>
            </div>
        </div>

        <div id="page-debts" class="page" style="display:none;">
            <div class="debt-section">
                <h2 class="gold-title">⚠️ СПИСОК ДОЛЖНИКОВ</h2>
                <div id="debt-list"></div>
            </div>
        </div>

        <div id="page-my-stats" class="page" style="display:none;">
            <div class="inventory-section">
                <h2 class="gold-title">👤 ЛИЧНЫЙ КАБИНЕТ</h2>
                <div class="stat-summary-box">
                    <p>Накоплено к выплате: <span id="accumulated-salary" style="color:var(--green); font-size:22px; font-weight:bold;">0</span> ₸</p>
                </div>
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Выручка</th>
                            <th>ЗП (8% + 6к)</th>
                            <th>Аванс</th>
                            <th>Итог</th>
                        </tr>
                    </thead>
                    <tbody id="admin-personal-history"></tbody>
                </table>
            </div>
        </div>

        <div id="page-accounting" class="page" style="display:none;">
            <div class="owner-section">
                <h2 class="gold-title">📈 ОБЩАЯ БУХГАЛТЕРИЯ</h2>
                <div id="shift-history-list"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
