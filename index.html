<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay" style="display: flex;">
        <div class="auth-box">
            <h1 class="gold-text">SENSEI</h1>
            <p class="subtitle">BILLIARD CLUB</p>
            <div class="input-group">
                <label>Администратор</label>
                <select id="staff-select"></select>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>
            <button onclick="login()" class="btn-primary">ВОЙТИ</button>
            <p id="auth-error" class="error-text" style="display:none; color: red; margin-top: 10px;">Неверный пароль!</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header class="header">
            <div class="header-left">
                <span class="gold-text">SENSEI</span> | <span id="display-user"></span>
            </div>
            <button onclick="logout()" class="btn-logout">ВЫЙТИ</button>
        </header>

        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">ВЫРУЧКА</span>
                <span class="stat-value gold-text"><span id="rev-val">0</span> ₸</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ВАША ЗП</span>
                <span class="stat-value" style="color: #2ecc71;"><span id="salary-val">0</span> ₸</span>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('hall', event)">ЗАЛ</button>
            <button class="tab-btn" onclick="switchTab('stock', event)">СКЛАД</button>
        </nav>

        <main class="container">
            <div id="tab-hall" class="tab-content active">
                <div class="tables-grid" id="tables-list"></div>
            </div>
            <div id="tab-stock" class="tab-content" style="display:none;">
                <div class="card">
                    <button onclick="addStockItem()" class="btn-primary" style="margin-bottom: 10px;">+ Добавить товар</button>
                    <div id="stock-list"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
