<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI BILLIARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="overlay">
        <div class="auth-card">
            <div class="logo-circle">S</div>
            <h1 class="gold-text">SENSEI</h1>
            <p style="font-size:10px; letter-spacing:3px; color:#888; margin-bottom:20px;">BILLIARD CLUB</p>
            <div style="text-align:left;">
                <label style="font-size:10px; color:#d4af37;">АДМИНИСТРАТОР</label>
                <select id="staff-select"></select>
                <label style="font-size:10px; color:#d4af37; margin-top:10px; display:block;">ПАРОЛЬ</label>
                <input type="password" id="pass-input" placeholder="••••">
            </div>
            <button onclick="login()" class="btn-gold">ОТКРЫТЬ СМЕНУ</button>
            <p id="auth-error" style="color:#e74c3c; font-size:12px; display:none;">❌ Неверный пароль!</p>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header class="header">
            <div><b class="gold-text">SENSEI</b> | <span id="user-display">---</span></div>
            <div class="nav">
                <button class="nav-link active" onclick="showTab('hall', this)">ЗАЛ</button>
                <button class="nav-link" onclick="showTab('stock', this)">СКЛАД</button>
                <button class="nav-link" onclick="showTab('debts', this)">ДОЛГИ</button>
                <button id="owner-tab" class="nav-link" onclick="showTab('owner', this)" style="display:none;">УПРАВЛЕНИЕ</button>
            </div>
            <button onclick="logout()" style="background:#c0392b; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">ВЫЙТИ</button>
        </header>

        <div class="stats">
            <div class="stat-box">
                <span style="font-size:10px; color:#888;">ВЫРУЧКА СМЕНЫ</span><br>
                <span style="font-size:24px; font-weight:bold;"><span id="rev-val">0</span> ₸</span>
            </div>
            <div class="stat-box">
                <span style="font-size:10px; color:#d4af37;">ВАША ЗП (8% + 6к)</span><br>
                <span style="font-size:24px; font-weight:bold; color:#d4af37;"><span id="salary-val">0</span> ₸</span>
            </div>
        </div>

        <main>
            <div id="tab-hall" class="tab-content active">
                <div id="tables-grid" class="grid"></div>
                <h3 style="padding:0 30px; color:#d4af37;">📊 ЧЕКИ (ОЖИДАЮТ ОПЛАТЫ)</h3>
                <div id="active-checks"></div>
            </div>

            <div id="tab-stock" class="tab-content" style="display:none; padding:30px;">
                <button onclick="addStock()" class="btn-gold" style="width:auto; margin-bottom:15
