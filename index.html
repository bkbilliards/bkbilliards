<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="auth-screen" class="overlay">
        <div class="auth-card">
            <div class="logo-wrapper"><div class="logo-circle">S</div></div>
            <h1 class="brand-title gold-gradient">SENSEI</h1>
            <p class="tagline">BILLIARD CLUB</p>
            <div class="input-group">
                <label>ВЫБЕРИТЕ СОТРУДНИКА</label>
                <select id="staff-select"></select>
            </div>
            <div class="input-group">
                <label>ПАРОЛЬ (PIN)</label>
                <input type="password" id="pass-input" placeholder="••••">
            </div>
            <button onclick="login()" class="btn-gold btn-large shadow-gold">ОТКРЫТЬ СМЕНУ</button>
            <p id="auth-error" style="display:none; color:var(--red); margin-top:10px;">❌ Ошибка входа</p>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header class="header">
            <div class="header-brand"><span class="gold-gradient" style="font-weight:800; font-size: 20px;">SENSEI</span> <span id="user-display" style="margin-left:10px;">---</span> <span id="sync-status">🟢</span></div>
            <button onclick="logout()" class="btn-exit">ВЫЙТИ</button>
        </header>

        <div class="global-stats-bar">
            <div class="global-stat-item"><div class="stat-label">ВЫРУЧКА</div><div class="stat-value gold-text" id="global-rev">0 ₸</div></div>
            <div class="global-stat-item"><div class="stat-label">ЗП СМЕНЫ</div><div class="stat-value" id="global-shift-zp">0 ₸</div></div>
            <div class="global-stat-item" style="border:none;"><div class="stat-label" style="color:var(--green);">БАЛАНС</div><div class="stat-value" style="color:var(--green);" id="global-total-zp">0 ₸</div></div>
        </div>

        <nav class="nav">
            <button class="nav-link active" onclick="showTab('hall', this)">ЗАЛ</button>
            <button class="nav-link" onclick="showTab('archive', this)">ЧЕКИ</button>
            <button class="nav-link" onclick="showTab('stock', this)">СКЛАД</button>
            <button class="nav-link" onclick="showTab('debts', this)">ДОЛГИ</button>
            <button id="acc-tab" class="nav-link" onclick="showTab('acc', this)" style="display:none; color:var(--green);">БУХГАЛТЕРИЯ</button>
            <button id="owner-tab" class="nav-link" onclick="showTab('owner', this)" style="display:none; color:var(--gold);">АДМИНЫ</button>
        </nav>

        <main class="content">
            <div id="tab-hall" class="tab-pane active">
                <div id="tables-grid" class="grid"></div>
                <div class="section-header"><h3 class="gold-text">ОЖИДАЮТ ОПЛАТЫ</h3><button onclick="openBarModal('standalone')" class="btn-outline">+ БАР</button></div>
                <div id="active-checks" class="checks-container"></div>
            </div>
            <div id="tab-archive" class="tab-pane" style="display:none;"><div class="card"><table class="data-table"><thead><tr><th>ВРЕМЯ</th><th>ИМЯ</th><th>СУММА</th><th>МЕТОД</th><th>АДМИН</th></tr></thead><tbody id="archive-list"></tbody></table></div></div>
            <div id="tab-stock" class="tab-pane" style="display:none;"><div class="card"><button id="btn-open-add-item" onclick="openAddItemModal()" class="btn-gold" style="width:auto; margin-bottom:20px; display:none;">+ ТОВАР</button><table class="data-table"><thead><tr><th>ТОВАР</th><th>ОСТАТОК</th><th>ЦЕНА</th><th>УПРАВЛЕНИЕ</th></tr></thead><tbody id="stock-list"></tbody></table></div></div>
            <div id="tab-debts" class="tab-pane" style="display:none;"><div class="card"><table class="data-table"><thead><tr><th>КЛИЕНТ</th><th>СУММА</th><th>ДЕЙСТВИЕ</th></tr></thead><tbody id="debts-list"></tbody></table></div></div>
            <div id="tab-acc" class="tab-pane" style="display:none;"><div class="card"><div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;" id="acc-summary"></div><table class="data-table" style="margin-top:20px;"><thead><tr><th>АДМИН</th><th>СМЕНА</th><th>Z-ОТЧЕТ</th><th>ЗП</th></tr></thead><tbody id="history-list"></tbody></table></div></div>
            <div id="tab-owner" class="tab-pane" style="display:none;"><div class="card"><button onclick="addCustomAdmin()" class="btn-gold">+ АДМИН</button><div id="custom-admins-list" style="margin:20px 0;"></div><div id="admin-salaries-list"></div><button onclick="resetDatabase()" class="btn-red" style="margin-top:40px;">СБРОС БАЗЫ</button></div></div>
        </main>
    </div>

    <div id="z-report-modal" class="overlay" style="display:none;"><div class="modal-card"><h2>Z-ОТЧЕТ</h2><p>Наличные в кассе:</p><input type="number" id="z-cash-input" class="large-input"><button onclick="confirmZReport()" class="btn-gold btn-large">ЗАКРЫТЬ</button></div></div>
    <div id="pay-modal" class="overlay" style="display:none;"><div class="modal-card"><div class="modal-close" onclick="closeModal('pay-modal')">×</div><h2 class="pay-amount" id="pay-total">0 ₸</h2><p id="pay-info"></p><div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-bottom:20px;"><button onclick="applyDiscount(10)" class="btn-outline">10%</button><button onclick="applyDiscount(25)" class="btn-outline">25%</button><button onclick="applyDiscount(50)" class="btn-outline">50%</button><button onclick="applyDiscount(0)" class="btn-outline">0%</button></div><div class="pay-buttons"><button onclick="processPayment('Наличные')" class="btn-pay cash">💵 НАЛИЧНЫЕ</button><button onclick="processPayment('QR')" class="btn-pay qr">📱 QR-КОД</button><button onclick="processPayment('Долг')" class="btn-pay debt">В ДОЛГ</button></div></div></div>
    <div id="bar-modal" class="overlay" style="display:none;"><div class="modal-card"><div class="modal-close" onclick="closeModal('bar-modal')">×</div><h2>БАР</h2><input type="text" id="bar-search" oninput="renderBarSearch()" placeholder="Поиск..."><div id="bar-items-list" class="scroll-list"></div></div></div>
    <div id="add-item-modal" class="overlay" style="display:none;"><div class="modal-card"><h2>НОВЫЙ ТОВАР</h2><input type="text" id="new-item-name" placeholder="Имя"><input type="number" id="new-item-price" placeholder="Цена"><input type="number" id="new-item-qty" placeholder="Кол-во"><button onclick="saveNewItem()" class="btn-gold btn-large">СОХРАНИТЬ</button></div></div>

    <script src="app.js"></script>
</body>
</html>
