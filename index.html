<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI BILLIARD CLUB CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-box">
            <img src="logo.png" alt="SENSEI Logo" class="auth-logo-img">
            <h1 class="auth-logo">SENSEI</h1>
            <p class="auth-subtitle">BILLIARD CLUB</p>
            <div class="input-group">
                <label>Кто на смене?</label>
                <select id="staff-select"></select>
            </div>
            <div class="input-group">
                <label>Пароль:</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>
            <button onclick="login()" class="btn-login">ВОЙТИ</button>
            <p id="auth-error" class="error-msg">❌ Неверный пароль!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">
            <div class="header-top">
                <div class="header-logo-block">
                    <img src="logo.png.jpeg" alt="SENSEI" class="header-logo-img">
                    <h1>SENSEI</h1>
                </div>
                <div class="user-info">
                    <span id="role-badge" class="badge"></span>
                    <span id="display-admin-name"></span>
                </div>
            </div>
            <div id="shift-stats">
                <div class="stat-card">Выручка: <span id="stat-revenue">0</span> ₸</div>
                <div class="stat-card">ЗП: <span id="stat-salary">0</span> ₸</div>
            </div>
            <div class="navigation-menu">
                <button class="nav-btn active" onclick="switchPage('hall')">ЗАЛ</button>
                <button class="nav-btn" onclick="switchPage('debts')">ДОЛГИ</button>
                <button id="owner-nav-btn" class="nav-btn" onclick="switchPage('accounting')" style="display:none;">БУХГАЛТЕРИЯ</button>
            </div>
            <button class="btn-logout" onclick="logout()">Закрыть смену и Выйти</button>
        </div>

        <div id="page-hall" class="page">
            <div class="hall-map"></div>

            <div class="open-checks-section">
                <h2 style="color:#d4af37; border-bottom:1px solid #333; padding-bottom:10px;">📊 ТЕКУЩИЕ ЧЕКИ (Неоплаченные)</h2>
                <div id="open-checks-list"></div>
            </div>

            <div class="inventory-section">
                <h2 style="color:#d4af37; margin:0 0 10px 0;">📦 СКЛАД</h2>
                <div id="inventory-list"></div>
                <button id="btn-add-inventory" onclick="addInventoryItem()" class="btn-start" style="width:auto; display:none;">+ Товар</button>
            </div>
        </div>

        <div id="page-debts" class="page" style="display:none;">
            <div class="debt-section">
                <h2 style="color:#d4af37;">⚠️ ВСЕ ДОЛГИ</h2>
                <div id="debt-list"></div>
            </div>
        </div>

        <div id="page-accounting" class="page" style="display:none;">
            <div class="owner-section">
                <h2 style="color: #d4af37;">📊 БУХГАЛТЕРИЯ И ЗАРПЛАТА</h2>
                <div id="shift-history-list"></div>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
