<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI BILLIARD CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-box">
            <h1 class="auth-logo">SENSEI</h1>
            <p class="auth-subtitle">BILLIARD CLUB</p>
            
            <div class="input-group">
                <label>Кто заступает на смену?</label>
                <select id="staff-select"></select>
            </div>

            <div class="input-group">
                <label>Ваш пароль:</label>
                <input type="password" id="pass-input" placeholder="****">
            </div>

            <button onclick="login()" class="btn-login">ОТКРЫТЬ СМЕНУ</button>
            <p id="auth-error" class="error-msg">❌ Неверный пароль!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">
            <div class="header-top">
                <h1>SENSEI</h1>
                <div class="user-info">
                    <span id="role-badge" class="badge"></span>
                    <span id="display-admin-name"></span>
                </div>
            </div>
            <div id="shift-stats">
                <div class="stat-card">Выручка: <span id="stat-revenue">0</span> ₸</div>
                <div class="stat-card">ЗП (8%+6к): <span id="stat-salary">0</span> ₸</div>
            </div>
            <button class="btn-logout" onclick="logout()">Завершить смену и Выйти</button>
        </div>

        <div class="hall-map"></div>

        <div id="owner-section" style="display:none;">
            <div class="inventory-section">
                <h2 style="color: #d4af37; margin-top: 0;">📦 СКЛАД И ПРИБЫЛЬ</h2>
                <div id="inventory-list"></div>
                <button onclick="addInventoryItem()" class="btn-start" style="width:auto">+ Добавить товар</button>
            </div>
        </div>

        <div class="debt-section">
            <h2 style="color: #d4af37;">⚠️ ДОЛГИ</h2>
            <div id="debt-list"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
